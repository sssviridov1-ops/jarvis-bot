services:
  - type: web
    name: jarvis-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python claude_bot_render.py
    plan: free
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GROQ_KEY
        sync: false
      - key: CHAT_ID
        value: "675453898"
      - key: GROUP_ID
        value: "-1003723900178"
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
